<!DOCTYPE html>

<html>
    <head>
        <link rel="stylesheet" href="/bootstrap/css/bootstrap-italia.min.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    </head>

    <body>
        <div class="container-fluid justify-content-center align-items-center d-flex mt-5">
            <form method="post" action="" enctype="multipart/form-data" class="justify-content-center d-flex w-100 ">
                <input type="file" name="upload-manual" id="upload-manual" class="upload" multiple="multiple" />
                <label for="upload-manual" >
                    <svg class="icon icon-sm" aria-hidden="true"><use href="bootstrap/svg/sprites.svg#it-upload"></use></svg>
                    <span>Carica file</span>
                </label>
                <ul class="upload-file-list" id="file-list">

                </ul>
            </form> 

        </div>




        <script src="list.js" defer></script>
        <script src="/bootstrap/js/bootstrap-italia.bundle.min.js"></script>
    </body>
</html>
